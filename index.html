<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Planilha do Thales</title>
<style>
  :root{
    --bg:#ffffff;
    --ink:#17181c;
    --sub:#8b8d97;
    --line:#eeeff2;
    --orange:#ff5c1a;
    --green:#18c974;
    --green-bg:#d9fbe6;
    --red:#ff4f5a;
    --red-bg:#ffe2e4;
    --yellow-bg:#ffe9b8;
    --entrada:#1fb45a;
    --saida:#e8541f;
    --diario:#e91e7d;
    --economia:#77c81a;
    --cartao:#7b4de0;
    --outros:#9aa0ab;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink); overscroll-behavior:none;
  }
  #app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* status/header */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 6px;}
  .cal-badge{width:46px; height:46px; border-radius:12px; background:#f4f5f7; border-top:5px solid var(--orange);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px;}
  .month-nav{display:flex; align-items:center; gap:18px; font-size:22px; font-weight:800;}
  .month-nav button{border:none; background:none; font-size:22px; color:var(--ink); padding:4px 8px; cursor:pointer;}
  .grid-badge{width:40px; height:40px; border-radius:8px; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:2px; padding:2px; background:#fff; cursor:pointer;}
  .grid-badge span{border-radius:3px;}
  .grid-badge span:nth-child(1),.grid-badge span:nth-child(2),.grid-badge span:nth-child(3){background:#8be3ae;}
  .grid-badge span:nth-child(4){background:#ffe08a;}

  .subheader{display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--line);}
  .subheader .label{color:var(--sub); font-size:17px; font-weight:600;}
  .subheader .saldo-label{color:var(--sub); font-size:15px; font-weight:600;}

  .filter-pill{display:flex; align-items:center; gap:8px; border:1.5px solid var(--line); border-radius:24px; padding:8px 14px; font-weight:700; font-size:16px; cursor:pointer; margin:12px 16px 4px;}
  .filter-pill .dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;}
  .filter-pill .chev{margin-left:auto; color:var(--sub);}

  .cols-head{display:flex; padding:6px 16px; color:var(--sub); font-size:14px;}
  .cols-head .c-dia{width:52px;}
  .cols-head .c-saldo{margin-left:auto;}

  /* day list */
  .day-list{flex:1; overflow-y:auto; padding-bottom:110px;}
  .day-row{display:flex; align-items:stretch; border-bottom:1px solid var(--line); position:relative; cursor:pointer;}
  .day-row .c-dia{width:52px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; color:var(--sub);}
  .day-row.today .c-dia{background:#17181c; color:#fff; font-weight:800;}
  .day-row .c-mid{flex:1; display:flex; align-items:center; gap:10px; padding:14px 6px;}
  .day-row .type-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800; flex-shrink:0; opacity:.35;}
  .day-row .type-dot.has-value{opacity:1;}
  .day-row .amount{font-size:19px; color:#c9cbd2; font-weight:500;}
  .day-row .amount.has-value{color:var(--ink); font-weight:600;}
  .day-row .c-saldo{width:150px; display:flex; align-items:center; justify-content:flex-end; padding:0 16px; font-size:19px; font-weight:600;}
  .day-row.pos .c-saldo-wrap{background:var(--yellow-bg);}
  .day-row .c-saldo-wrap{width:150px; display:flex; align-items:center; justify-content:flex-end; padding:0 16px;}
  .day-row.green .c-saldo-wrap{background:var(--green-bg);}
  .day-row.red .c-saldo-wrap{background:var(--red-bg); color:var(--red);}
  .day-row.red .c-saldo{color:var(--red);}

  /* selection indicator - green diagonal corner */
  .day-row.selected .c-dia{position:relative; overflow:hidden;}
  .day-row.selected .c-dia::after{
    content:"";
    position:absolute; top:-14px; right:-14px; width:34px; height:34px;
    background:var(--green); transform:rotate(45deg);
  }
  .day-row.selected .c-dia::before{
    content:"✓";
    position:absolute; top:2px; right:2px; color:#fff; font-size:11px; font-weight:900; z-index:2;
  }

  .trial-banner{background:#d7ecff; color:#1a1a1a; padding:14px 16px; font-size:15px; display:flex; align-items:center; gap:10px; margin-top:auto;}

  /* bottom nav */
  .bottomnav{position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; background:#fff; border-top:3px solid var(--orange);
    display:flex; align-items:center; justify-content:space-around; padding:10px 6px 22px; z-index:30;}
  .nav-item{display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--sub); font-size:12px; font-weight:700; background:none; border:none; cursor:pointer;}
  .nav-item.active{color:var(--orange);}
  .nav-item svg{width:22px; height:22px;}
  .fab{width:56px; height:56px; border-radius:50%; background:#17181c; color:#fff; border:none; font-size:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-top:-18px; box-shadow:0 6px 16px rgba(0,0,0,.25);}

  /* sheet overlay */
  .overlay{position:fixed; inset:0; background:rgba(20,20,25,.45); z-index:50; display:none; align-items:flex-end; justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{background:#fff; width:100%; max-width:480px; border-radius:22px 22px 0 0; max-height:92vh; overflow-y:auto; padding-bottom:24px;
    animation:slideUp .22s ease-out;}
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet-handle{width:40px; height:5px; background:#e2e3e8; border-radius:3px; margin:10px auto 4px;}
  .sheet-header{display:flex; align-items:center; justify-content:space-between; padding:8px 18px 4px;}
  .sheet-header h2{font-size:18px; margin:0;}
  .sheet-close{background:#f4f5f7; border:none; width:32px; height:32px; border-radius:50%; font-size:18px; cursor:pointer; color:var(--sub);}

  /* date nav inside add sheet */
  .date-nav{display:flex; align-items:center; justify-content:center; gap:22px; padding:14px 16px 8px;}
  .date-nav button{border:none; background:#f4f5f7; width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; color:var(--ink);}
  .date-nav .date-label{font-size:19px; font-weight:800;}

  /* category grid */
  .cat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:16px;}
  .cat-btn{display:flex; flex-direction:column; align-items:center; gap:8px; border:1.5px solid var(--line); border-radius:16px; padding:14px 6px; background:#fff; cursor:pointer; font-size:13px; font-weight:700; color:var(--ink);}
  .cat-btn:active{background:#f7f7f9;}
  .cat-icon{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:800;}

  /* form */
  .form-wrap{padding:6px 18px 18px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; color:var(--sub); font-weight:700; margin-bottom:6px; text-transform:uppercase; letter-spacing:.02em;}
  .field input[type=text], .field input[type=number], .field input[type=date]{
    width:100%; border:1.5px solid var(--line); border-radius:12px; padding:13px 14px; font-size:16px; font-family:inherit; color:var(--ink); background:#fafafb;
  }
  .field input:focus{outline:none; border-color:var(--orange); background:#fff;}
  .amount-input{display:flex; align-items:center; border:1.5px solid var(--line); border-radius:12px; background:#fafafb; padding:0 14px;}
  .amount-input span{color:var(--sub); font-weight:700; margin-right:6px;}
  .amount-input input{border:none; background:none; padding:13px 0; font-size:20px; font-weight:700; flex:1; font-family:inherit;}
  .amount-input input:focus{outline:none;}

  .repeat-select{width:100%; text-align:left; border:1.5px solid var(--line); border-radius:12px; padding:13px 14px; background:#fafafb; font-size:16px; color:var(--ink); display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-family:inherit;}
  .repeat-select .chev{color:var(--sub);}

  .card-select-btn{width:100%; text-align:left; border:1.5px solid var(--line); border-radius:12px; padding:13px 14px; background:#fafafb; font-size:16px; color:var(--ink); display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-family:inherit;}
  .card-select-btn.empty{color:var(--sub);}

  .tags-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:2px;}
  .tag-chip{display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:20px; font-size:14px; font-weight:700; cursor:pointer; border:1.5px solid transparent; color:#fff;}
  .tag-chip.off{background:#f4f5f7 !important; color:var(--sub) !important; border-color:var(--line);}
  .tag-chip .dot{width:8px; height:8px; border-radius:50%; background:#fff;}
  .tag-add{display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:20px; font-size:14px; font-weight:700; border:1.5px dashed #c8cad2; color:var(--sub); background:#fff; cursor:pointer;}

  .save-btn{width:calc(100% - 36px); margin:8px 18px 4px; background:var(--orange); color:#fff; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:800; cursor:pointer;}
  .save-btn:active{opacity:.85;}

  /* small popup menus (repeat options / color picker) */
  .mini-sheet{background:#fff; border-radius:16px; margin:0 18px 18px; border:1.5px solid var(--line); overflow:hidden;}
  .mini-opt{padding:14px 16px; font-size:16px; border-bottom:1px solid var(--line); cursor:pointer; display:flex; justify-content:space-between;}
  .mini-opt:last-child{border-bottom:none;}
  .mini-opt.sel{color:var(--orange); font-weight:800;}

  .color-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; padding:6px 18px 18px;}
  .swatch{width:100%; aspect-ratio:1; border-radius:50%; cursor:pointer; border:3px solid transparent;}
  .swatch.sel{border-color:#17181c;}

  .empty-note{color:var(--sub); font-size:14px; padding:0 18px 10px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- storage helpers ---------------- */
const STORAGE_KEY = 'planilha-thales-data';
let data = { transactions: [], cards: [], tags: [
  {id:'t1', name:'Adega', color:'#e8e07a'},
  {id:'t2', name:'Aluguel', color:'#d2a679'},
  {id:'t3', name:'Apartamento', color:'#7ec3f0'},
]};

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    if(res && res.value){ data = JSON.parse(res.value); }
  }catch(e){ /* first run, nothing stored yet */ }
}
async function saveData(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(data)); }
  catch(e){ console.error('storage save failed', e); }
}

/* ---------------- date helpers ---------------- */
function pad(n){ return String(n).padStart(2,'0'); }
function toISO(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

const today = new Date();
let state = {
  year: today.getFullYear(),
  month: today.getMonth()+1, // 1-12
  selectedDay: today.getDate(),
  filterType: 'entrada',
  sheetOpen: false,
  sheetStep: 'category', // category | form | repeat-picker | tag-color-picker | card-form
  formType: null,
  formDate: toISO(today.getFullYear(), today.getMonth()+1, today.getDate()),
  formDraft: {},
};

const TYPES = {
  entrada:  {label:'entrada',  color:'var(--entrada)', hex:'#1fb45a', icon:'↙'},
  saida:    {label:'saída',    color:'var(--saida)',   hex:'#e8541f', icon:'↗'},
  diario:   {label:'diário',   color:'var(--diario)',  hex:'#e91e7d', icon:'D'},
  economia: {label:'economia', color:'var(--economia)',hex:'#77c81a', icon:'E'},
  cartao:   {label:'cartão',   color:'var(--cartao)',  hex:'#7b4de0', icon:'C'},
  outros:   {label:'outros',   color:'var(--outros)',  hex:'#9aa0ab', icon:'•'},
};

const REPEAT_OPTS = [
  {id:'none', label:'não repete'},
  {id:'monthly', label:'mensalmente'},
  {id:'weekly', label:'semanalmente'},
  {id:'daily', label:'diariamente'},
  {id:'installments', label:'parcelado'},
];

function fmtMoney(v){
  const n = Number(v)||0;
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* ---------------- balance computation ---------------- */
// returns map dateISO -> {entrada,saida,diario,economia,cartao,outros, net}
function dayTotals(y,m){
  const out = {};
  const dim = daysInMonth(y,m);
  for(let d=1; d<=dim; d++){
    const iso = toISO(y,m,d);
    out[iso] = {entrada:0, saida:0, diario:0, economia:0, cartao:0, outros:0};
  }
  data.transactions.forEach(tx=>{
    if(!tx.date) return;
    const [ty,tm] = tx.date.split('-').map(Number);
    if(ty===y && tm===m){
      if(out[tx.date]) out[tx.date][tx.type] = (out[tx.date][tx.type]||0) + Number(tx.amount||0);
    }
  });
  return out;
}

// cumulative running balance carried across all months up to given y,m
function cumulativeStartBalance(y,m){
  let bal = 0;
  data.transactions.forEach(tx=>{
    if(!tx.date) return;
    const [ty,tm] = tx.date.split('-').map(Number);
    if(ty < y || (ty===y && tm < m)){
      const sign = (tx.type==='entrada') ? 1 : -1;
      bal += sign*Number(tx.amount||0);
    }
  });
  return bal;
}

/* ---------------- render: main saldos screen ---------------- */
function render(){
  const app = document.getElementById('app');
  const y = state.year, m = state.month;
  const totals = dayTotals(y,m);
  let running = cumulativeStartBalance(y,m);
  const dim = daysInMonth(y,m);
  const isCurrentMonth = (y===today.getFullYear() && m===today.getMonth()+1);
  const filt = state.filterType;

  let rows = '';
  for(let d=1; d<=dim; d++){
    const iso = toISO(y,m,d);
    const t = totals[iso];
    const sign = (filt==='entrada') ? 1 : -1;
    running += (filt==='entrada' ? t.entrada : (t.saida+t.diario+t.economia+t.cartao+t.outros)) * sign;
    const amt = t[filt] || 0;
    const isToday = isCurrentMonth && d===today.getDate();
    const isSelected = d===state.selectedDay;
    let rowClass = 'day-row';
    if(isToday) rowClass += ' today';
    if(isSelected) rowClass += ' selected';
    let balClass = '';
    if(running > 500) balClass = 'green';
    else if(running >= 0) balClass = 'pos';
    else balClass = 'red';

    rows += `
    <div class="${rowClass}" data-day="${d}">
      <div class="c-dia">${d}</div>
      <div class="c-mid">
        <div class="type-dot ${amt>0?'has-value':''}" style="background:${TYPES[filt].hex}">${TYPES[filt].icon}</div>
        <div class="amount ${amt>0?'has-value':''}">R$ ${fmtMoney(amt)}</div>
      </div>
      <div class="c-saldo-wrap ${balClass}">
        <div class="c-saldo">R$ ${fmtMoney(running)}</div>
      </div>
    </div>`;
  }

  app.innerHTML = `
    <div class="topbar">
      <div class="cal-badge">${today.getDate()}</div>
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span>${MONTHS[m-1]}/${String(y).slice(2)}</span>
        <button id="nextMonth">›</button>
      </div>
      <div class="grid-badge"><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="filter-pill" id="filterPill">
      <div class="dot" style="background:${TYPES[filt].hex}">${TYPES[filt].icon}</div>
      <span>${filt==='diario'?'diários':filt==='economia'?'economias':filt}</span>
      <span class="chev">▾</span>
    </div>

    <div class="cols-head">
      <span class="c-dia">dia</span>
      <span class="c-saldo">saldos</span>
    </div>

    <div class="day-list" id="dayList">
      ${rows}
    </div>

    <div class="trial-banner">📅 seu teste grátis acaba em 17/07/26</div>

    <div class="bottomnav">
      <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        saldos
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="16" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="12" y2="18"/></svg>
        totais
      </button>
      <button class="fab" id="fabAdd">+</button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12l-8 8-9-9V3h8z"/></svg>
        tags
      </button>
      <button class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        menu
      </button>
    </div>

    <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
  `;

  document.getElementById('prevMonth').onclick = ()=>{ changeMonth(-1); };
  document.getElementById('nextMonth').onclick = ()=>{ changeMonth(1); };
  document.getElementById('fabAdd').onclick = ()=>{ openAddSheet(); };
  document.getElementById('filterPill').onclick = cycleFilter;
  document.querySelectorAll('.day-row').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.selectedDay = Number(el.dataset.day);
      render();
    });
  });

  if(state.sheetOpen){ document.getElementById('overlay').classList.add('show'); renderSheet(); }
}

function changeMonth(delta){
  let m = state.month + delta;
  let y = state.year;
  if(m>12){ m=1; y++; } else if(m<1){ m=12; y--; }
  state.month = m; state.year = y;
  const dim = daysInMonth(y,m);
  if(state.selectedDay > dim) state.selectedDay = dim;
  render();
}

function cycleFilter(){
  const order = ['entrada','saida','diario','economia','cartao','outros'];
  const i = order.indexOf(state.filterType);
  state.filterType = order[(i+1)%order.length];
  render();
}

/* ---------------- add-transaction sheet ---------------- */
function openAddSheet(){
  state.sheetOpen = true;
  state.sheetStep = 'category';
  state.formType = null;
  state.formDate = toISO(state.year, state.month, state.selectedDay);
  state.formDraft = {description:'', amount:'', repeat:'none', installments:2, tagIds:[], cardId:null};
  render();
}
function closeSheet(){
  state.sheetOpen = false;
  render();
}

function shiftFormDate(delta){
  const [y,m,d] = state.formDate.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+delta);
  state.formDate = toISO(dt.getFullYear(), dt.getMonth()+1, dt.getDate());
  renderSheet();
}

function dateNavHTML(){
  const [y,m,d] = state.formDate.split('-').map(Number);
  return `
  <div class="date-nav">
    <button id="dnPrev">‹</button>
    <div class="date-label">${pad(d)}/${pad(m)}</div>
    <button id="dnNext">›</button>
  </div>`;
}

function renderSheet(){
  const sheet = document.getElementById('sheet');
  if(!sheet) return;
  let html = `<div class="sheet-handle"></div>`;

  if(state.sheetStep === 'category'){
    html += `
      <div class="sheet-header"><h2>adicionar movimentação</h2><button class="sheet-close" id="closeSheet">✕</button></div>
      ${dateNavHTML()}
      <div class="cat-grid">
        ${Object.entries(TYPES).map(([key,t])=>`
          <button class="cat-btn" data-type="${key}">
            <div class="cat-icon" style="background:${t.hex}">${t.icon}</div>
            <span>${t.label}</span>
          </button>
        `).join('')}
      </div>
    `;
    sheet.innerHTML = html;
    document.getElementById('closeSheet').onclick = closeSheet;
    document.getElementById('dnPrev').onclick = ()=>shiftFormDate(-1);
    document.getElementById('dnNext').onclick = ()=>shiftFormDate(1);
    sheet.querySelectorAll('.cat-btn').forEach(b=>{
      b.onclick = ()=>{
        state.formType = b.dataset.type;
        state.sheetStep = 'form';
        renderSheet();
      };
    });
    return;
  }

  if(state.sheetStep === 'form'){
    const t = TYPES[state.formType];
    const fd = state.formDraft;
    const repeatLabel = REPEAT_OPTS.find(o=>o.id===fd.repeat).label;

    html += `
      <div class="sheet-header">
        <h2 style="color:${t.hex}">${t.label}</h2>
        <button class="sheet-close" id="closeSheet">✕</button>
      </div>
      ${dateNavHTML()}
      <div class="form-wrap">
        <div class="field">
          <label>descrição</label>
          <input type="text" id="fDesc" placeholder="ex: mercado, salário..." value="${fd.description||''}">
        </div>
        <div class="field">
          <label>valor</label>
          <div class="amount-input">
            <span>R$</span>
            <input type="number" inputmode="decimal" id="fAmount" placeholder="0,00" value="${fd.amount||''}">
          </div>
        </div>
        <div class="field">
          <label>data</label>
          <input type="date" id="fDate" value="${state.formDate}">
        </div>

        ${state.formType==='cartao' ? `
        <div class="field">
          <label>cartão</label>
          <button class="card-select-btn ${fd.cardId?'':'empty'}" id="cardSelectBtn">
            <span>${fd.cardId ? (data.cards.find(c=>c.id===fd.cardId)||{}).name || 'escolha um cartão' : 'escolha um cartão'}</span>
            <span class="chev">▾</span>
          </button>
        </div>` : ''}

        <div class="field">
          <label>repetição</label>
          <button class="repeat-select" id="repeatBtn">
            <span>${repeatLabel}</span>
            <span class="chev">▾</span>
          </button>
        </div>

        ${fd.repeat==='installments' ? `
        <div class="field">
          <label>número de parcelas</label>
          <input type="number" id="fInstallments" min="2" max="60" value="${fd.installments||2}">
        </div>` : ''}

        <div class="field">
          <label>tags</label>
          <div class="tags-row" id="tagsRow">
            ${data.tags.map(tag=>`
              <div class="tag-chip ${fd.tagIds.includes(tag.id)?'':'off'}" data-tag="${tag.id}" style="background:${fd.tagIds.includes(tag.id)?tag.color:''}">
                <span class="dot" style="background:${fd.tagIds.includes(tag.id)?'#fff':tag.color}"></span>${tag.name}
              </div>
            `).join('')}
            <div class="tag-add" id="tagAddBtn">+ nova tag</div>
          </div>
        </div>
      </div>
      <button class="save-btn" id="saveBtn" style="background:${t.hex}">salvar ${t.label}</button>
    `;
    sheet.innerHTML = html;

    document.getElementById('closeSheet').onclick = closeSheet;
    document.getElementById('dnPrev').onclick = ()=>{ shiftFormDate(-1); document.getElementById('fDate').value = state.formDate; };
    document.getElementById('dnNext').onclick = ()=>{ shiftFormDate(1); document.getElementById('fDate').value = state.formDate; };

    document.getElementById('fDesc').oninput = e=> fd.description = e.target.value;
    document.getElementById('fAmount').oninput = e=> fd.amount = e.target.value;
    document.getElementById('fDate').onchange = e=>{ state.formDate = e.target.value; renderSheet(); };
    const instEl = document.getElementById('fInstallments');
    if(instEl) instEl.oninput = e=> fd.installments = e.target.value;

    document.getElementById('repeatBtn').onclick = ()=>{ state.sheetStep='repeat-picker'; renderSheet(); };

    if(state.formType==='cartao'){
      document.getElementById('cardSelectBtn').onclick = ()=>{ state.sheetStep='card-picker'; renderSheet(); };
    }

    sheet.querySelectorAll('.tag-chip').forEach(chip=>{
      chip.onclick = ()=>{
        const id = chip.dataset.tag;
        const idx = fd.tagIds.indexOf(id);
        if(idx>-1) fd.tagIds.splice(idx,1); else fd.tagIds.push(id);
        renderSheet();
      };
    });
    document.getElementById('tagAddBtn').onclick = ()=>{ state.sheetStep='new-tag'; state.newTagDraft={name:'', color:'#ff8a5c'}; renderSheet(); };

    document.getElementById('saveBtn').onclick = ()=>{
      const amount = parseFloat((fd.amount||'0').toString().replace(',','.'));
      if(!amount || amount<=0){ alert('informe um valor válido'); return; }
      const baseTx = {
        id: 'tx_'+Date.now()+Math.random().toString(36).slice(2,7),
        type: state.formType,
        description: fd.description||'',
        amount: amount,
        date: state.formDate,
        repeat: fd.repeat,
        tagIds: fd.tagIds.slice(),
        cardId: fd.cardId||null,
      };
      const newTxs = generateOccurrences(baseTx, fd.installments);
      data.transactions.push(...newTxs);
      saveData();
      state.selectedDay = Number(state.formDate.split('-')[2]);
      const [ty,tm] = state.formDate.split('-').map(Number);
      state.year = ty; state.month = tm;
      closeSheet();
    };
    return;
  }

  if(state.sheetStep === 'repeat-picker'){
    html += `
      <div class="sheet-header"><h2>repetição</h2><button class="sheet-close" id="closeSheet">✕</button></div>
      <div class="mini-sheet">
        ${REPEAT_OPTS.map(o=>`<div class="mini-opt ${state.formDraft.repeat===o.id?'sel':''}" data-r="${o.id}">${o.label} ${state.formDraft.repeat===o.id?'✓':''}</div>`).join('')}
      </div>
    `;
    sheet.innerHTML = html;
    document.getElementById('closeSheet').onclick = closeSheet;
    sheet.querySelectorAll('.mini-opt').forEach(o=>{
      o.onclick = ()=>{ state.formDraft.repeat = o.dataset.r; state.sheetStep='form'; renderSheet(); };
    });
    return;
  }

  if(state.sheetStep === 'new-tag'){
    const colors = ['#ff5c1a','#e91e7d','#7b4de0','#1fb45a','#e8e07a','#77c81a','#f0a13a','#4dc0e0','#d2a679','#9aa0ab','#e8541f','#3aa0ff'];
    const nt = state.newTagDraft;
    html += `
      <div class="sheet-header"><h2>nova tag</h2><button class="sheet-close" id="closeSheet">✕</button></div>
      <div class="form-wrap">
        <div class="field">
          <label>nome da tag</label>
          <input type="text" id="newTagName" placeholder="ex: mercado" value="${nt.name}">
        </div>
        <div class="field"><label>cor</label></div>
      </div>
      <div class="color-grid" id="colorGrid">
        ${colors.map(c=>`<div class="swatch ${nt.color===c?'sel':''}" data-c="${c}" style="background:${c}"></div>`).join('')}
      </div>
      <button class="save-btn" id="saveTagBtn" style="background:${nt.color}">salvar tag</button>
    `;
    sheet.innerHTML = html;
    document.getElementById('closeSheet').onclick = closeSheet;
    document.getElementById('newTagName').oninput = e=> nt.name = e.target.value;
    sheet.querySelectorAll('.swatch').forEach(s=>{
      s.onclick = ()=>{ nt.color = s.dataset.c; renderSheet(); };
    });
    document.getElementById('saveTagBtn').onclick = ()=>{
      if(!nt.name.trim()){ alert('dê um nome pra tag'); return; }
      const tag = {id:'tag_'+Date.now(), name:nt.name.trim(), color:nt.color};
      data.tags.push(tag);
      state.formDraft.tagIds.push(tag.id);
      saveData();
      state.sheetStep = 'form';
      renderSheet();
    };
    return;
  }

  if(state.sheetStep === 'card-picker'){
    html += `
      <div class="sheet-header"><h2>escolha um cartão</h2><button class="sheet-close" id="closeSheet">✕</button></div>
      <div class="mini-sheet">
        ${data.cards.length ? data.cards.map(c=>`<div class="mini-opt" data-c="${c.id}">${c.name} · fecha dia ${c.closeDay}, vence dia ${c.dueDay}</div>`).join('') : ''}
      </div>
      ${data.cards.length===0 ? `<div class="empty-note">nenhum cartão cadastrado ainda.</div>` : ''}
      <button class="save-btn" id="addCardBtn" style="background:var(--cartao)">+ adicionar cartão</button>
    `;
    sheet.innerHTML = html;
    document.getElementById('closeSheet').onclick = closeSheet;
    sheet.querySelectorAll('.mini-opt').forEach(o=>{
      o.onclick = ()=>{ state.formDraft.cardId = o.dataset.c; state.sheetStep='form'; renderSheet(); };
    });
    document.getElementById('addCardBtn').onclick = ()=>{
      state.newCardDraft = {name:'', closeDay:'', dueDay:''};
      state.sheetStep = 'card-form';
      renderSheet();
    };
    return;
  }

  if(state.sheetStep === 'card-form'){
    const nc = state.newCardDraft;
    html += `
      <div class="sheet-header"><h2>novo cartão</h2><button class="sheet-close" id="closeSheet">✕</button></div>
      <div class="form-wrap">
        <div class="field">
          <label>nome do cartão</label>
          <input type="text" id="cName" placeholder="ex: nubank, inter..." value="${nc.name}">
        </div>
        <div class="field">
          <label>dia de fechamento</label>
          <input type="number" id="cClose" min="1" max="31" placeholder="ex: 20" value="${nc.closeDay}">
        </div>
        <div class="field">
          <label>dia de vencimento</label>
          <input type="number" id="cDue" min="1" max="31" placeholder="ex: 27" value="${nc.dueDay}">
        </div>
      </div>
      <button class="save-btn" id="saveCardBtn" style="background:var(--cartao)">salvar cartão</button>
    `;
    sheet.innerHTML = html;
    document.getElementById('closeSheet').onclick = closeSheet;
    document.getElementById('cName').oninput = e=> nc.name = e.target.value;
    document.getElementById('cClose').oninput = e=> nc.closeDay = e.target.value;
    document.getElementById('cDue').oninput = e=> nc.dueDay = e.target.value;
    document.getElementById('saveCardBtn').onclick = ()=>{
      if(!nc.name.trim() || !nc.closeDay || !nc.dueDay){ alert('preencha nome, fechamento e vencimento'); return; }
      const card = {id:'card_'+Date.now(), name:nc.name.trim(), closeDay:Number(nc.closeDay), dueDay:Number(nc.dueDay)};
      data.cards.push(card);
      state.formDraft.cardId = card.id;
      saveData();
      state.sheetStep = 'form';
      renderSheet();
    };
    return;
  }
}

/* generate repeated / installment occurrences from a base transaction */
function generateOccurrences(base, installments){
  const out = [];
  if(base.repeat === 'none'){
    out.push(base);
    return out;
  }
  if(base.repeat === 'installments'){
    const n = Math.max(2, parseInt(installments)||2);
    const [y,m,d] = base.date.split('-').map(Number);
    for(let i=0;i<n;i++){
      const dt = new Date(y, m-1+i, d);
      out.push({...base, id: base.id+'_p'+i, date: toISO(dt.getFullYear(), dt.getMonth()+1, dt.getDate()),
        description: base.description + ` (${i+1}/${n})`});
    }
    return out;
  }
  // recurring: generate this occurrence + next 11 (roughly a year ahead) so it shows in future months
  const count = base.repeat==='daily' ? 60 : base.repeat==='weekly' ? 26 : 12;
  const [y,m,d] = base.date.split('-').map(Number);
  for(let i=0;i<count;i++){
    let dt;
    if(base.repeat==='monthly') dt = new Date(y, m-1+i, d);
    else if(base.repeat==='weekly') dt = new Date(y, m-1, d + i*7);
    else dt = new Date(y, m-1, d + i);
    out.push({...base, id: base.id+'_r'+i, date: toISO(dt.getFullYear(), dt.getMonth()+1, dt.getDate())});
  }
  return out;
}

/* ---------------- init ---------------- */
(async function init(){
  await loadData();
  render();
})();
</script>
