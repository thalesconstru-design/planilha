<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#eae5dc" />
  <title>Minhas Finanças</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--t1); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

    :root {
      --green: #0e9b68; --green-dim: #0b7d53; --green-glow: rgba(14,155,104,.16);
      --red: #d6453f;   --red-dim: #b73934;   --red-glow: rgba(214,69,63,.14);
      --blue: #3568c9;  --amber: #c8851b;      --purple: #7c5cc4;
      --teal: #128f82;
      --bg: #eae5dc; --s1: #f6f3ec; --s2: #ece6d9; --s3: #e0d9c7; --s4: #c9bfa8;
      --border: rgba(58,50,38,.10); --border-mid: rgba(58,50,38,.18); --border-hi: rgba(58,50,38,.28);
      --t1: #2c2620; --t2: #6b6256; --t3: #968c7b;
      --r: 10px; --r-lg: 16px; --r-xl: 22px;
      --ease: all .2s cubic-bezier(.4,0,.2,1);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 99px; }

    /* PIN SCREEN */
    #pin-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: flex; align-items: flex-end; justify-content: center;
    }
    #pin-screen.hidden { display: none; }
    .pin-card {
      background: var(--s1); border: 1px solid var(--border-mid);
      border-radius: 28px 28px 0 0; padding: 32px 24px max(24px, env(safe-area-inset-bottom));
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
    }
    .pin-logo { width: 56px; height: 56px; background: linear-gradient(135deg, var(--green), #00a36e); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .pin-title { font-size: 18px; font-weight: 700; color: var(--t1); }
    .pin-subtitle { font-size: 12px; color: var(--t3); margin-top: -16px; }
    .pin-dots { display: flex; gap: 12px; }
    .pin-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--s3); border: 2px solid var(--border-mid); transition: all .2s ease; }
    .pin-dot.filled { background: var(--green); border-color: var(--green); }
    .pin-dot.error { background: var(--red); border-color: var(--red); }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
    .pin-btn {
      background: var(--s2); border: 1px solid var(--border-mid); border-radius: 14px;
      height: 62px; font-size: 20px; font-weight: 700; color: var(--t1);
      cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: var(--ease); user-select: none; -webkit-tap-highlight-color: transparent;
      font-family: 'JetBrains Mono', monospace; gap: 1px;
    }
    .pin-btn .pin-btn-sub { font-size: 8px; font-weight: 600; letter-spacing: .15em; color: var(--t3); font-family: 'Sora', sans-serif; }
    .pin-btn:active { background: var(--s4); transform: scale(.94); }
    .pin-btn.zero { grid-column: 2; }
    .pin-btn.del { background: transparent; border-color: transparent; color: var(--t3); }
    .pin-btn.del:active { color: var(--red); }
    .pin-error-msg { font-size: 12px; color: var(--red); min-height: 14px; font-weight: 500; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* APP LAYOUT */
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; background: var(--bg); overflow: hidden; }

    /* MOBILE TOPBAR */
    #mobile-topbar {
      background: var(--s1); border-bottom: 1px solid var(--border);
      padding: 10px 16px 8px; display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0;
    }
    .mob-app-name { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .12em; }
    .mob-month-row { display: flex; align-items: center; gap: 8px; }
    .mob-month-nav-btn { background: var(--s2); border: 1px solid var(--border-mid); border-radius: 7px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--t2); font-size: 13px; transition: var(--ease); -webkit-tap-highlight-color: transparent; }
    .mob-month-nav-btn:active { background: var(--s3); }
    .mob-month-label { font-size: 16px; font-weight: 700; color: var(--t1); min-width: 140px; text-align: center; }

    /* CONTENT */
    #content { flex: 1; overflow-y: auto; padding: 14px 14px 90px; -webkit-overflow-scrolling: touch; }

    /* COMPACT SUMMARY CARDS */
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .sum-card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 10px 10px 9px; position: relative; overflow: hidden; animation: fadeUp .4s ease both; cursor: default; }
    .sum-card::before { content:''; position: absolute; top:0; left:0; right:0; height:2px; border-radius: 12px 12px 0 0; }
    .sum-card.blue::before   { background: var(--blue); }
    .sum-card.green::before  { background: var(--green); }
    .sum-card.red::before    { background: var(--red); }
    .sum-card.teal::before   { background: var(--teal); }
    .sum-card.purple::before { background: var(--purple); }
    .sum-label-s { font-size: 9px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing:.06em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sum-value-s { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .sum-value-s.green  { color: var(--green); } .sum-value-s.red    { color: var(--red); }
    .sum-value-s.blue   { color: var(--blue); }  .sum-value-s.teal   { color: var(--teal); }
    .sum-value-s.purple { color: var(--purple); }

    /* PANELS */
    .panel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; animation: fadeUp .4s ease .1s both; }
    .panel-hd { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .panel-hd h3 { font-size: 12px; font-weight: 600; color: var(--t1); display: flex; align-items: center; gap: 6px; }
    .panel-hd a { font-size: 11px; color: var(--green); cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 3px; }

    /* CALENDAR */
    .cal-wrap { padding: 12px 14px 10px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-dow { text-align: center; font-size: 9px; font-weight: 600; color: var(--t3); text-transform: uppercase; padding: 2px 0 5px; letter-spacing: .05em; }
    .cal-cell {
      aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      transition: var(--ease); position: relative; padding: 1px; gap: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-cell:hover { background: var(--s2); }
    .cal-cell.today { background: var(--green); box-shadow: 0 2px 8px var(--green-glow); }
    .cal-cell.today .cal-day { color: #fff; font-weight: 700; }
    .cal-cell.has-data:not(.today) { background: var(--s2); }
    .cal-cell.other-month { opacity: .3; pointer-events: none; }
    .cal-cell.selected:not(.today) { background: var(--s3); border: 1.5px solid var(--green); }
    .cal-day { font-size: 11px; font-weight: 500; color: var(--t1); line-height: 1; }
    .cal-today .cal-day { color: #fff; }
    .cal-dots { display: flex; gap: 2px; justify-content: center; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .cal-dot.green { background: var(--green); }
    .cal-dot.red { background: var(--red); }
    .cal-amounts { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .cal-amt { font-size: 7px; font-weight: 600; font-family: 'JetBrains Mono', monospace; line-height: 1.1; }
    .cal-amt.pos { color: var(--green); }
    .cal-amt.neg { color: var(--red); }
    .cal-cell.today .cal-amt { color: rgba(255,255,255,.85); }

    /* DAY DETAIL */
    .day-detail { padding: 10px 14px 12px; border-top: 1px solid var(--border); animation: fadeUp .2s ease; }
    .day-detail-hd { font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 8px; }
    .day-tx-item { display: flex; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .day-tx-item:last-child { border-bottom: none; }
    .day-tx-icon { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .day-tx-icon.rec { background: rgba(14,155,104,.12); }
    .day-tx-icon.exp { background: rgba(214,69,63,.10); }
    .day-tx-info { flex: 1; min-width: 0; }
    .day-tx-desc { font-size: 12px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-tx-cat { font-size: 10px; color: var(--t3); }
    .day-tx-val { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
    .day-tx-val.pos { color: var(--green); }
    .day-tx-val.neg { color: var(--red); }

    /* PROJECTION */
    .proj-wrap { padding: 12px 14px; }
    .proj-months { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .proj-months::-webkit-scrollbar { display: none; }
    .proj-month {
      flex-shrink: 0; width: 100px; background: var(--s2); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 10px; cursor: pointer; transition: var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .proj-month:active { transform: scale(.97); }
    .proj-month.current { border-color: var(--green); background: var(--green-glow); }
    .proj-month.future { border-color: var(--border); background: var(--s2); opacity: .85; }
    .proj-m-label { font-size: 10px; font-weight: 600; color: var(--t3); margin-bottom: 6px; white-space: nowrap; }
    .proj-month.current .proj-m-label { color: var(--green); }
    .proj-m-val-row { display: flex; flex-direction: column; gap: 3px; }
    .proj-m-val { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .proj-m-val.rec { color: var(--green); }
    .proj-m-val.exp { color: var(--red); }
    .proj-m-val.sal.pos { color: var(--blue); }
    .proj-m-val.sal.neg { color: var(--red); }
    .proj-m-tag { font-size: 8px; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .proj-note { font-size: 10px; color: var(--t3); padding: 8px 14px 4px; display: flex; align-items: center; gap: 5px; }

    /* TRANSACTIONS */
    .tx-list { padding: 0 14px; }
    .tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); transition: var(--ease); }
    .tx-item:last-child { border-bottom: none; }
    .tx-item[data-id] { cursor: pointer; }
    .tx-item.selected { background: rgba(14,155,104,.07); margin: 0 -14px; padding-left: 14px; padding-right: 14px; border-radius: 8px; border-bottom-color: transparent; box-shadow: inset 3px 0 0 var(--green); }
    .tx-checkbox { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--s2); }
    .tx-item.selected .tx-checkbox { background: var(--green); border-color: var(--green); }
    .tx-checkbox i { font-size: 10px; color: #fff; opacity: 0; }
    .tx-item.selected .tx-checkbox i { opacity: 1; }
    .tx-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .tx-icon.rec { background: rgba(14,155,104,.12); } .tx-icon.exp { background: rgba(214,69,63,.10); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 12px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 10px; color: var(--t3); margin-top: 2px; }
    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-val { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .tx-val.pos { color: var(--green); } .tx-val.neg { color: var(--red); }
    .tx-date-s { font-size: 10px; color: var(--t3); margin-top: 2px; }
    .tx-edit { background: none; border: none; cursor: pointer; color: var(--t3); font-size: 14px; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: var(--ease); flex-shrink: 0; }
    .tx-edit:hover { background: rgba(53,104,201,.15); color: var(--blue); }
    .tx-del { background: none; border: none; cursor: pointer; color: var(--t3); font-size: 14px; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: var(--ease); flex-shrink: 0; }
    .tx-del:hover { background: rgba(214,69,63,.15); color: var(--red); }

    /* SELECTION BAR */
    .tx-selection-bar { display: none; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border-mid); background: var(--s2); flex-wrap: wrap; }
    .tx-selection-bar.show { display: flex; animation: fadeUp .2s ease; }
    .sel-info { font-size: 11px; font-weight: 600; color: var(--t1); }
    .sel-totals { display: flex; gap: 8px; flex-wrap: wrap; }
    .sel-chip { font-size: 10px; color: var(--t3); background: var(--s1); border: 1px solid var(--border-mid); padding: 4px 8px; border-radius: 6px; }
    .sel-chip strong { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .sel-chip.rec strong { color: var(--green); }
    .sel-chip.exp strong { color: var(--red); }
    .sel-chip.net strong { color: var(--blue); }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 14px; background: var(--s1); }
    .tab { font-size: 12px; font-weight: 500; padding: 11px 13px; cursor: pointer; color: var(--t3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: var(--ease); user-select: none; }
    .tab:hover { color: var(--t1); } .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* BADGES */
    .badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 99px; }
    .badge-rc  { background: rgba(14,155,104,.15); color: var(--green); }
    .badge-exp { background: rgba(214,69,63,.12);  color: var(--red); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 1000; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--s1); border: 1px solid var(--border-mid); border-radius: var(--r-xl) var(--r-xl) 0 0; padding: 24px 20px max(24px, env(safe-area-inset-bottom)); width: 100%; max-width: 480px; box-shadow: 0 -20px 60px rgba(0,0,0,.4); animation: slideUp .3s ease; max-height: 92vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-header h3 { font-size: 15px; font-weight: 600; color: var(--t1); }
    .modal-close { background: var(--s2); border: 1px solid var(--border); width: 28px; height: 28px; border-radius: 7px; cursor: pointer; color: var(--t2); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: var(--ease); }
    .modal-close:hover { background: var(--s3); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing:.08em; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-mid); border-radius: 8px; font-size: 13px; font-family: 'Sora', sans-serif; color: var(--t1); background: var(--s2); outline: none; transition: var(--ease); }
    .field input::placeholder { color: var(--t3); }
    .field input:focus, .field select:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
    .field-hint { font-size: 11px; color: var(--t3); margin-top: 5px; line-height: 1.5; }

    /* COLOR PICKER */
    .color-swatches { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 5px; }
    .swatch { width: 26px; height: 26px; border-radius: 7px; cursor: pointer; border: 2px solid transparent; transition: var(--ease); flex-shrink: 0; }
    .swatch.active { border-color: var(--t1); transform: scale(1.18); }
    .swatch:hover  { transform: scale(1.1); }

    /* EMOJI PICKER */
    .emoji-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 5px; }
    .emoji-opt { font-size: 18px; cursor: pointer; width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: var(--ease); }
    .emoji-opt:hover { background: var(--s3); }
    .emoji-opt.active { border-color: var(--green); background: var(--green-glow); }

    /* EMPTY */
    .empty { padding: 40px 20px; text-align: center; color: var(--t3); font-size: 12px; }
    .empty-icon { font-size: 30px; margin-bottom: 10px; opacity: .35; }
    .empty p { line-height: 1.7; max-width: 240px; margin: 0 auto; }

    /* ACCOUNTS PAGE */
    .accounts-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .account-card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; transition: var(--ease); animation: fadeUp .35s ease both; position: relative; overflow: hidden; }
    .account-card:hover { border-color: var(--border-mid); }
    .account-card-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
    .account-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .account-icon-wrap { display: flex; align-items: center; gap: 10px; }
    .account-icon-box { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .account-name { font-size: 14px; font-weight: 600; color: var(--t1); }
    .account-type { font-size: 10px; color: var(--t3); margin-top: 2px; }
    .account-actions { display: flex; gap: 5px; }
    .account-action-btn { background: var(--s2); border: 1px solid var(--border); width: 26px; height: 26px; border-radius: 6px; cursor: pointer; color: var(--t2); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: var(--ease); }
    .account-action-btn:hover { background: var(--s3); }
    .account-action-btn.del:hover { background: rgba(214,69,63,.15); color: var(--red); border-color: rgba(214,69,63,.3); }
    .account-bal { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: 10px; }
    .account-bal.pos { color: var(--green); } .account-bal.neg { color: var(--red); }
    .account-stats { display: flex; gap: 14px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .account-stat { font-size: 10px; color: var(--t3); }
    .account-stat strong { display: block; font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 1px; }
    .add-account-card { background: var(--s2); border: 1px dashed var(--border-mid); border-radius: var(--r-lg); padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: var(--ease); min-height: 140px; }
    .add-account-card:hover { border-color: var(--green); background: var(--green-glow); }
    .add-account-card i { font-size: 24px; color: var(--t3); transition: var(--ease); }
    .add-account-card:hover i { color: var(--green); }
    .add-account-card span { font-size: 12px; color: var(--t3); font-weight: 500; transition: var(--ease); }
    .add-account-card:hover span { color: var(--green); }

    /* BUDGET */
    .budget-card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; transition: var(--ease); animation: fadeUp .35s ease both; margin-bottom: 10px; }
    .budget-card:hover { border-color: var(--border-mid); }
    .budget-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .budget-emoji { font-size: 20px; } .budget-title { font-size: 13px; font-weight: 600; color: var(--t1); }
    .budget-limit { font-size: 10px; color: var(--t3); margin-top: 1px; }
    .budget-spent { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 8px 0 3px; }
    .budget-footer { display: flex; justify-content: space-between; font-size: 10px; margin-top: 6px; }
    .bar-track { background: var(--s3); border-radius: 99px; height: 5px; overflow: hidden; }
    .bar-fill   { height: 5px; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }

    /* SAVINGS */
    .savings-hero { background: linear-gradient(135deg, rgba(18,143,130,.1) 0%, rgba(53,104,201,.07) 100%); border: 1px solid rgba(18,143,130,.2); border-radius: var(--r-lg); padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    .savings-hero-label { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: .1em; }
    .savings-hero-val { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--teal); }
    .savings-hero-sub { font-size: 10px; color: var(--t3); margin-top: 2px; }
    .savings-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .savings-card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; transition: var(--ease); animation: fadeUp .35s ease both; position: relative; overflow: hidden; }
    .savings-card:hover { border-color: var(--border-mid); }
    .savings-card-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .savings-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; justify-content: space-between; }
    .savings-card-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .savings-card-info { flex: 1; }
    .savings-card-name { font-size: 13px; font-weight: 600; color: var(--t1); }
    .savings-card-goal { font-size: 10px; color: var(--t3); margin-top: 2px; }
    .savings-card-actions { display: flex; gap: 5px; }
    .savings-val { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--teal); margin-bottom: 10px; }
    .savings-pct { font-size: 10px; color: var(--t3); margin-top: 7px; display: flex; justify-content: space-between; }
    .add-savings-card { background: var(--s2); border: 1px dashed var(--border-mid); border-radius: var(--r-lg); padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: var(--ease); min-height: 120px; }
    .add-savings-card:hover { border-color: var(--teal); background: rgba(18,143,130,.06); }
    .add-savings-card i { font-size: 24px; color: var(--t3); transition: var(--ease); }
    .add-savings-card:hover i { color: var(--teal); }
    .add-savings-card span { font-size: 12px; color: var(--t3); font-weight: 500; transition: var(--ease); }
    .add-savings-card:hover span { color: var(--teal); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-box { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; animation: fadeUp .35s ease both; }
    .stat-box:last-child { grid-column: 1 / -1; }
    .stat-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:5px; }
    .stat-val { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    /* SEARCH */
    .search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .search-inner { position: relative; }
    .search-icon  { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 14px; pointer-events: none; }
    .search-input { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border-mid); border-radius: 8px; font-size: 12px; font-family: 'Sora', sans-serif; color: var(--t1); background: var(--s2); outline: none; transition: var(--ease); }
    .search-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
    .search-input::placeholder { color: var(--t3); }

    /* SETTINGS */
    .settings-grid { display: grid; gap: 12px; }
    .settings-card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
    .settings-card-hd { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 9px; }
    .settings-card-hd i { font-size: 18px; color: var(--t3); }
    .settings-card-hd h3 { font-size: 13px; font-weight: 600; color: var(--t1); }
    .settings-card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .settings-row { display: flex; align-items: center; gap: 10px; }
    .settings-label { flex: 1; font-size: 12px; color: var(--t2); }
    .settings-label small { display: block; font-size: 10px; color: var(--t3); margin-top: 2px; }

    /* BUTTONS */
    .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; font-family: 'Sora', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: var(--ease); -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(.97); }
    .btn-green { background: var(--green); color: #fff; box-shadow: 0 4px 14px var(--green-glow); }
    .btn-green:hover { background: var(--green-dim); }
    .btn-red   { background: var(--red); color: #fff; box-shadow: 0 4px 14px var(--red-glow); }
    .btn-red:hover { background: var(--red-dim); }
    .btn-blue  { background: var(--blue); color: #fff; }
    .btn-blue:hover { opacity:.88; }
    .btn-teal  { background: var(--teal); color: #fff; }
    .btn-teal:hover { opacity:.88; }
    .btn-ghost { background: var(--s2); color: var(--t2); border: 1px solid var(--border-mid); }
    .btn-ghost:hover { background: var(--s3); color: var(--t1); }
    .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 7px; }

    /* BOTTOM NAV */
    #bottom-nav {
      background: var(--s1); border-top: 1px solid var(--border);
      padding: 6px 0 max(6px, env(safe-area-inset-bottom)); flex-shrink: 0;
      position: relative;
    }
    .bnav-inner { display: flex; justify-content: space-around; align-items: flex-end; }
    .bnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 5px 8px; border-radius: 10px; cursor: pointer; transition: var(--ease);
      color: var(--t3); font-size: 9px; font-weight: 600; min-width: 44px;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .bnav-item i { font-size: 20px; }
    .bnav-item.active { color: var(--green); }

    /* CENTER FAB */
    #fab-center {
      position: relative; display: flex; flex-direction: column; align-items: center; margin-bottom: -2px;
    }
    #fab-center-btn {
      width: 52px; height: 52px; border-radius: 16px;
      background: var(--green); border: none; cursor: pointer;
      color: #fff; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px var(--green-glow);
      transition: var(--ease); -webkit-tap-highlight-color: transparent;
      margin-bottom: 2px;
    }
    #fab-center-btn:active { transform: scale(.92); }
    #fab-center-btn.open { transform: rotate(45deg); background: var(--red); }
    .fab-menu {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; align-items: center;
      opacity: 0; pointer-events: none; transition: var(--ease);
    }
    .fab-menu.open { opacity: 1; pointer-events: all; }
    .fab-menu-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .fab-menu-item span { background: var(--s2); border: 1px solid var(--border-mid); padding: 5px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; color: var(--t1); }
    .fab-mini-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; border: none; cursor: pointer; box-shadow: 0 3px 14px rgba(0,0,0,.25); -webkit-tap-highlight-color: transparent; }

    /* TOAST */
    #toast { position: fixed; bottom: calc(76px + env(safe-area-inset-bottom)); right: 12px; left: 12px; max-width: 440px; margin: 0 auto; background: var(--s2); border: 1px solid var(--border-mid); color: var(--t1); padding: 11px 16px; border-radius: 10px; font-size: 12px; font-weight: 500; transform: translateY(80px); opacity: 0; transition: all .3s cubic-bezier(.4,0,.2,1); z-index: 9999; display: flex; align-items: center; gap: 8px; box-shadow: 0 6px 30px rgba(0,0,0,.3); pointer-events: none; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast i { font-size: 16px; }

    /* FP PANEL */
    .fp-panel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; animation: fadeUp .35s ease both; }

    /* MODAL CONFIRM */
    #modal-confirm .modal { }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body>

<script>

   CONSTANTS
================================================================ */

const CHART_PAL = ['#00d68f','#4da6ff','#f6a623','#ff5c5c','#a78bfa','#5DCAA5','#D85A30','#D4537E','#3B6D11','#f472b6'];

const SAV_COLORS = ['#128f82','#3568c9','#c8851b','#7c5cc4','#0e9b68','#c2487a','#c1443e','#c1631f','#5c8a1f','#1f7fae'];

const BUDGETS = [
  {name:'Alimentação',limit:600,icon:'🍽️'},{name:'Transporte',limit:300,icon:'🚗'},

/* ================================================================

================================================================ */
let _pinBuffer='';
function getPin(){ return localStorage.getItem(K_PIN)||'1234'; }

function pinPress(d){
  if(_pinBuffer.length>=4) return;
  _pinBuffer+=d; updatePinDots();
  if(_pinBuffer.length===4) setTimeout(()=>checkPin(),120);
}
function pinDel(){ _pinBuffer=_pinBuffer.slice(0,-1); updatePinDots(); document.getElementById('pin-error').textContent=''; }
function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    d.classList.toggle('filled',i<_pinBuffer.length);
    d.classList.remove('error');
  }
}
function checkPin(){
  if(_pinBuffer===getPin()){
    document.getElementById('pin-screen').classList.add('hidden');
  } else {
    document.getElementById('pin-error').textContent='PIN incorreto.';
    for(let i=0;i<4;i++){
      const d=document.getElementById('pd'+i);
      d.classList.add('error'); d.classList.remove('filled');
      setTimeout(()=>{ d.classList.remove('error'); },600);
    }
    _pinBuffer='';
    setTimeout(()=>updatePinDots(),600);
  }
}
document.addEventListener('keydown',e=>{
  const ps=document.getElementById('pin-screen');
  if(!ps.classList.contains('hidden')){
    if(e.key>='0'&&e.key<='9') pinPress(e.key);
    if(e.key==='Backspace') pinDel();
    return;
  }
  if(e.key==='Escape'){closeModal('modal-tx');closeModal('modal-acc');closeModal('modal-sav');closeModal('modal-pin');closeConfirm();}
});
function savePin(){
  const old=document.getElementById('pin-old').value.trim();
  const nw=document.getElementById('pin-new').value.trim();
  const conf=document.getElementById('pin-confirm').value.trim();
  if(old!==getPin()){alert('PIN atual incorreto.');return;}
  if(nw.length!==4||!/^\d{4}$/.test(nw)){alert('Novo PIN deve ter 4 dígitos.');return;}
  if(nw!==conf){alert('PINs não coincidem.');return;}
  localStorage.setItem(K_PIN,nw);
  closeModal('modal-pin');
  toast('PIN alterado! 🔐','ti-lock','var(--green)');
}

function persist(){
  try{
    localStorage.setItem(K_TXS,JSON.stringify(txs));
    localStorage.setItem(K_ACCS,JSON.stringify(ACCS));
    localStorage.setItem(K_SAV,JSON.stringify(SAVINGS));
    localStorage.setItem(K_SAVMOV,JSON.stringify(SAV_MOVES));
  }catch(e){}
}
function hydrate(){
  try{
    const t=localStorage.getItem(K_TXS),a=localStorage.getItem(K_ACCS),s=localStorage.getItem(K_SAV),sm=localStorage.getItem(K_SAVMOV);
    if(t) txs=JSON.parse(t); if(a) ACCS=JSON.parse(a); if(s) SAVINGS=JSON.parse(s); if(sm) SAV_MOVES=JSON.parse(sm);
    nextId=txs.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
    nextAccId=ACCS.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
    nextSavId=SAVINGS.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
    nextSavMovId=SAV_MOVES.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
  }catch(e){ txs=[];ACCS=[];SAVINGS=[];SAV_MOVES=[]; }
}

/* ================================================================
   HELPERS
================================================================ */
function fmtBRL(v){ return 'R$\u00A0'+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtBRLSigned(v){ return (v<0?'-':'')+fmtBRL(v); }
function fmtBRLCompact(v){
  const abs=Math.abs(v);
  let s;
  if(abs>=1000) s=(abs/1000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'k';
  else s=abs.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
  return (v<0?'-':'')+'R$'+s;
}
function fmtDateLong(s){ const[y,m,d]=s.split('-'); return `${d}/${m}`; }
function monthTxs(d){
  const ref=d||curDate;
  return txs.filter(t=>{ const td=new Date(t.date+'T12:00:00'); return td.getMonth()===ref.getMonth()&&td.getFullYear()===ref.getFullYear(); });
}
function summary(mt){
  const list=mt||monthTxs();
  const rec=list.filter(t=>t.type==='receita').reduce((a,t)=>a+t.val,0);
  const exp=list.filter(t=>t.type==='despesa').reduce((a,t)=>a+t.val,0);
  const bal=ACCS.reduce((a,c)=>a+c.bal,0);
  return {rec,exp,sal:rec-exp,bal};
}

/* ================================================================
   CALENDAR
================================================================ */
function renderCalendarHTML(mt){
  const y=curDate.getFullYear(), m=curDate.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  const isCurrentMonth=(today.getFullYear()===y&&today.getMonth()===m);

  // Build day map
  const dayMap={};
  mt.forEach(t=>{
    const d=t.date; // YYYY-MM-DD
    if(!dayMap[d]) dayMap[d]={rec:0,exp:0,txs:[]};
    if(t.type==='receita') dayMap[d].rec+=t.val;
    else dayMap[d].exp+=t.val;
    dayMap[d].txs.push(t);
  });

  let html=`<div class="cal-wrap"><div class="cal-grid">`;
  // Day headers
  DAYS_SHORT.forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });
  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell other-month"></div>`;
  // Days
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data=dayMap[dateStr];
    const isToday=isCurrentMonth&&today.getDate()===d;
    const isSel=_selCalDay===dateStr;
    const hasData=!!data;
    let cls='cal-cell';
    if(isToday) cls+=' today';
    if(hasData&&!isToday) cls+=' has-data';
    if(isSel&&!isToday) cls+=' selected';

    let inner=`<span class="cal-day">${d}</span>`;
    if(hasData){
      if(data.rec>0&&data.exp>0){
        inner+=`<div class="cal-dots"><div class="cal-dot green"></div><div class="cal-dot red"></div></div>`;
      } else if(data.rec>0){
        inner+=`<div class="cal-dots"><div class="cal-dot green"></div></div>`;
      } else {
        inner+=`<div class="cal-dots"><div class="cal-dot red"></div></div>`;
      }
    }
    html+=`<div class="${cls}" onclick="selectCalDay('${dateStr}')">${inner}</div>`;
  }
  // Fill remaining cells
  const total=firstDay+daysInMonth;
  const rem=7-((total)%7); if(rem<7) for(let i=0;i<rem;i++) html+=`<div class="cal-cell other-month"></div>`;
  html+=`</div></div>`;
  return html;
}

function selectCalDay(dateStr){
  if(_selCalDay===dateStr){ _selCalDay=null; } else { _selCalDay=dateStr; }
  renderDayDetail(_selCalDay);
  // update cell selection visual
  document.querySelectorAll('.cal-cell').forEach(el=>el.classList.remove('selected'));
  if(_selCalDay){
    const onclick=`selectCalDay('${_selCalDay}')`;
    document.querySelectorAll('.cal-cell').forEach(el=>{
      if(el.getAttribute('onclick')===onclick&&!el.classList.contains('today')) el.classList.add('selected');

function renderDayDetail(dateStr){

  const dayExp=dayTxs.filter(t=>t.type==='despesa').reduce((a,t)=>a+t.val,0);

    </div>`).join('')}
  </div>`;
}

/* ================================================================
   PROJECTION
================================================================ */
function renderProjectionHTML(){
  // Use last 3 months average for future projection
  const today=new Date();
  const months=[];
  for(let i=-2;i<=4;i++){
    const d=new Date(curDate.getFullYear(),curDate.getMonth()+i,1);
    const mt=txs.filter(t=>{ const td=new Date(t.date+'T12:00:00'); return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear(); });
    const rec=mt.filter(t=>t.type==='receita').reduce((a,t)=>a+t.val,0);
    const exp=mt.filter(t=>t.type==='despesa').reduce((a,t)=>a+t.val,0);
    const isCurrent=(d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear());
    const isFuture=d>today||isCurrent;
    months.push({d,rec,exp,isCurrent,isFuture,hasTx:mt.length>0});
  }

  // Compute avg from past months with data for projection
  const pastWithData=months.filter(m=>!m.isFuture&&m.hasTx);
  const avgRec=pastWithData.length ? pastWithData.reduce((a,m)=>a+m.rec,0)/pastWithData.length : 0;
  const avgExp=pastWithData.length ? pastWithData.reduce((a,m)=>a+m.exp,0)/pastWithData.length : 0;

  let html=`<div class="proj-wrap"><div class="proj-months">`;
  months.forEach(m=>{
    let rec=m.rec, exp=m.exp;
    let tag='';
    if(m.isCurrent&&m.hasTx){ tag='Este mês'; }
    else if(m.isFuture&&!m.hasTx&&(avgRec>0||avgExp>0)){ rec=avgRec; exp=avgExp; tag='Projeção'; }
    else if(!m.hasTx){ tag='Sem dados'; }
    const sal=rec-exp;
    const isFutureProj=m.isFuture&&!m.hasTx;
    html+=`<div class="proj-month ${m.isCurrent?'current':m.isFuture?'future':''}">
      <div class="proj-m-label">${MONTHS_SHORT[m.d.getMonth()]} ${m.d.getFullYear()}</div>
      <div class="proj-m-val-row">
        <div>
          <div class="proj-m-tag">${isFutureProj?'Projeção Rec.':'Receita'}</div>
          <div class="proj-m-val rec">${rec>0?'+'+fmtBRLCompact(rec):'—'}</div>
        </div>
        <div style="margin-top:5px">
          <div class="proj-m-tag">${isFutureProj?'Projeção Desp.':'Despesa'}</div>
          <div class="proj-m-val exp">${exp>0?'-'+fmtBRLCompact(exp):'—'}</div>
        </div>
        <div style="margin-top:5px;padding-top:5px;border-top:1px solid var(--border)">
          <div class="proj-m-tag">Saldo</div>
          <div class="proj-m-val sal ${sal>=0?'pos':'neg'}">${(sal>=0?'+':'')+fmtBRLCompact(sal)}</div>
        </div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  if(avgRec>0||avgExp>0) html+=`<div class="proj-note"><i class="ti ti-info-circle" style="font-size:12px"></i> Projeções baseadas na média dos meses anteriores com dados.</div>`;
  html+=`</div>`;
  return html;
}

  document.getElementById('sel-count').textContent=selected.length;
  document.getElementById('sel-rec').textContent=fmtBRLCompact(rec);
  document.getElementById('sel-exp').textContent=fmtBRLCompact(exp);

function txRow(t,showDel,selectable){
  const isSel=!!(selectable&&_selTx.has(t.id));

function deleteTx(id){
  const t=txs.find(x=>x.id===id); if(!t) return;
  showConfirm(`Excluir "<strong>${t.desc}</strong>" (${t.type==='receita'?'+':'-'}${fmtBRL(t.val)})?`, ()=>{
    const ac=ACCS.find(a=>a.name===t.acc);
    if(ac) ac.bal+=t.type==='receita'?-t.val:t.val;
    txs=txs.filter(x=>x.id!==id); _selTx.delete(id);
    persist(); renderPage();
    toast('Lançamento excluído','ti-trash','var(--red)');
  });
}

================================================================ */
function renderRelatorios(){
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(curDate.getFullYear(),curDate.getMonth()-i,1);
    const mt=txs.filter(t=>{ const td=new Date(t.date+'T12:00:00'); return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear(); });
    months.push({
      label:MONTHS_SHORT[d.getMonth()],
      rec:mt.filter(t=>t.type==='receita').reduce((a,t)=>a+t.val,0),
      exp:mt.filter(t=>t.type==='despesa').reduce((a,t)=>a+t.val,0),
    });
  }
  const mt=monthTxs(), s=summary(mt);
  const avg=mt.filter(t=>t.type==='despesa').length?s.exp/mt.filter(t=>t.type==='despesa').length:0;
  document.getElementById('content').innerHTML=`
    <div class="stats-row" style="margin-bottom:12px">
      <div class="stat-box"><div class="stat-label">Transações</div><div class="stat-val" style="color:var(--blue)">${mt.length}</div></div>
      <div class="stat-box"><div class="stat-label">Ticket médio</div><div class="stat-val" style="color:var(--amber)">${fmtBRLCompact(avg)}</div></div>
      <div class="stat-box"><div class="stat-label">Taxa de poupança</div><div class="stat-val" style="color:${s.sal>=0?'var(--green)':'var(--red)'}">${s.rec>0?Math.round(s.sal/s.rec*100):0}%</div></div>
    </div>
    <div class="fp-panel">
      <div class="panel-hd"><h3>Receitas × Despesas — 6 meses</h3></div>
      <div style="display:flex;gap:12px;padding:8px 14px 4px;font-size:10px;color:var(--t2)">
        <span><span style="display:inline-block;width:9px;height:9px;background:#00d68f;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Receitas</span>
        <span><span style="display:inline-block;width:9px;height:9px;background:#ff5c5c;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Despesas</span>
      </div>
      <div style="padding:0 14px 16px;position:relative;height:220px">
        <canvas id="bar-chart"></canvas>
      </div>
    </div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('bar-chart'); if(!ctx) return;
    chartInst=new Chart(ctx,{type:'bar',
      data:{labels:months.map(m=>m.label),datasets:[
        {label:'Receitas',data:months.map(m=>m.rec),backgroundColor:'rgba(14,155,104,.75)',borderRadius:5,borderSkipped:false},
        {label:'Despesas',data:months.map(m=>m.exp),backgroundColor:'rgba(214,69,63,.65)',borderRadius:5,borderSkipped:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(40,35,25,.06)'},ticks:{color:'#8a8170',font:{size:10}}},
                y:{grid:{color:'rgba(40,35,25,.06)'},ticks:{color:'#8a8170',font:{size:10},callback:v=>'R$'+Number(v).toLocaleString('pt-BR')}}}}
    });
  },80);
}

function renderOrcamentos(){
  const mt=monthTxs();
  document.getElementById('content').innerHTML=BUDGETS.map((b,i)=>{
    const spent=mt.filter(t=>t.cat===b.name&&t.type==='despesa').reduce((a,t)=>a+t.val,0);
    const pct=Math.min(100,Math.round(spent/b.limit*100));
    const col=pct<80?'var(--green)':pct>=100?'var(--red)':'var(--amber)';
    return `<div class="budget-card" style="animation-delay:${i*0.05}s">
      <div class="budget-card-top"><span class="budget-emoji">${b.icon}</span><div><div class="budget-title">${b.name}</div><div class="budget-limit">Limite: ${fmtBRL(b.limit)}</div></div></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="budget-spent" style="color:${col}">${fmtBRL(spent)}</div>
      <div class="budget-footer"><span style="color:${col};font-weight:600">${pct}% utilizado</span><span style="color:var(--t3)">${fmtBRL(Math.max(0,b.limit-spent))} restante</span></div>
    </div>`;
  }).join('');
}

================================================================ */
function openSavModal(id){
  if(!ACCS.length){ toast('Crie uma conta primeiro!','ti-alert-triangle','var(--amber)'); navTo('contas'); return; }
  const sav=id?SAVINGS.find(s=>s.id===id):null;
  _savColor=sav?(sav.color||SAV_COLORS[0]):SAV_COLORS[0];
  _savEmoji=sav?(sav.icon||SAV_EMOJIS[0]):SAV_EMOJIS[0];
  document.getElementById('sav-emoji-row').innerHTML=SAV_EMOJIS.map(e=>`<div class="emoji-opt ${e===_savEmoji?'active':''}" onclick="pickSavEmoji('${e}',this)">${e}</div>`).join('');
  document.getElementById('sav-color-row').innerHTML=SAV_COLORS.map(c=>`<div class="swatch ${c===_savColor?'active':''}" style="background:${c}" onclick="pickSavColor('${c}',this)"></div>`).join('');
  document.getElementById('sav-f-acc').innerHTML=ACCS.map(a=>`<option value="${a.name}">${a.icon||''} ${a.name} (${fmtBRL(a.bal)})</option>`).join('');
  if(sav){
    document.getElementById('modal-sav-title').textContent='✏️ Editar Reserva';
    document.getElementById('sav-f-id').value=sav.id;
    document.getElementById('sav-f-name').value=sav.name;
    document.getElementById('sav-f-val').value=sav.val;
    document.getElementById('sav-f-goal').value=sav.goal||'';
    if(sav.accName&&ACCS.find(a=>a.name===sav.accName)) document.getElementById('sav-f-acc').value=sav.accName;
  } else {
    document.getElementById('modal-sav-title').textContent='🐷 Nova Reserva';
    document.getElementById('sav-f-id').value='';
    document.getElementById('sav-f-name').value='';
    document.getElementById('sav-f-val').value='';
    document.getElementById('sav-f-goal').value='';
  }
  document.getElementById('modal-sav').classList.add('open');
}
function pickSavEmoji(e,el){ _savEmoji=e; document.querySelectorAll('#sav-emoji-row .emoji-opt').forEach(x=>x.classList.remove('active')); el.classList.add('active'); }
function pickSavColor(c,el){ _savColor=c; document.querySelectorAll('#sav-color-row .swatch').forEach(x=>x.classList.remove('active')); el.classList.add('active'); }
function saveSavings(){
  const name=document.getElementById('sav-f-name').value.trim();
  const val=parseFloat(document.getElementById('sav-f-val').value)||0;
  const goal=parseFloat(document.getElementById('sav-f-goal').value)||0;
  const fid=document.getElementById('sav-f-id').value;
  const accName=document.getElementById('sav-f-acc').value;
  if(!name){ alert('Informe um nome.'); return; }
  if(val<0){ alert('Valor não pode ser negativo.'); return; }
  const today=new Date().toISOString().slice(0,10);
  if(fid){
    const sId=parseInt(fid), sv=SAVINGS.find(x=>x.id===sId);
    if(sv){
      const oldAcc=ACCS.find(a=>a.name===sv.accName); if(oldAcc) oldAcc.bal+=sv.val;
      const newAcc=ACCS.find(a=>a.name===accName); if(newAcc) newAcc.bal-=val;
      SAV_MOVES.push({id:nextSavMovId++,savId:sId,val:val-sv.val,date:today});
      sv.name=name;sv.val=val;sv.goal=goal;sv.color=_savColor;sv.icon=_savEmoji;sv.accName=accName;
    }
    toast('Reserva atualizada!','ti-check','var(--teal)');
  } else {
    const acc=ACCS.find(a=>a.name===accName); if(acc) acc.bal-=val;
    const ns={id:nextSavId++,name,val,goal,color:_savColor,icon:_savEmoji,accName};
    SAVINGS.push(ns);
    SAV_MOVES.push({id:nextSavMovId++,savId:ns.id,val,date:today});
    toast('Reserva criada! 🐷','ti-piggy-bank','var(--teal)');
  }
  persist(); closeModal('modal-sav');
  if(curPage==='poupanca') renderPoupanca();
  else if(curPage==='inicio') renderInicio();
  else if(curPage==='contas') renderContas();
}
function deleteSav(id){
  const s=SAVINGS.find(x=>x.id===id); if(!s) return;
  showConfirm(`Excluir "<strong>${s.name}</strong>"?<br>O valor ${fmtBRL(s.val)} volta para a conta "${s.accName||'-'}".`, ()=>{
    const acc=ACCS.find(a=>a.name===s.accName); if(acc) acc.bal+=s.val;
    SAV_MOVES.push({id:nextSavMovId++,savId:s.id,val:-s.val,date:new Date().toISOString().slice(0,10)});
    SAVINGS=SAVINGS.filter(x=>x.id!==id);
    persist();
    if(curPage==='poupanca') renderPoupanca();
    else if(curPage==='inicio') renderInicio();
    else if(curPage==='contas') renderContas();
    toast('Reserva removida','ti-trash','var(--red)');
  });
}

function accCard(a,i){

      <div class="account-actions">

        <button class="account-action-btn del" onclick="deleteAcc(${a.id})"><i class="ti ti-trash"></i></button>

      <div class="account-stat"><strong style="color:var(--red)">${fmtBRL(sai)}</strong>saídas</div>
    </div>
  </div>`;
}

function openAccModal(id){
  const acc=id?ACCS.find(a=>a.id===id):null;
  _accColor=acc?(acc.color||ACC_COLORS[0]):ACC_COLORS[0];
  _accEmoji=acc?(acc.icon||ACC_EMOJIS[0]):ACC_EMOJIS[0];
  document.getElementById('acc-emoji-row').innerHTML=ACC_EMOJIS.map(e=>`<div class="emoji-opt ${e===_accEmoji?'active':''}" onclick="pickEmoji('${e}',this)">${e}</div>`).join('');
  document.getElementById('acc-color-row').innerHTML=ACC_COLORS.map(c=>`<div class="swatch ${c===_accColor?'active':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');
  if(acc){
    document.getElementById('modal-acc-title').textContent='✏️ Editar Conta';
    document.getElementById('acc-f-id').value=acc.id;
    document.getElementById('acc-f-name').value=acc.name;
    document.getElementById('acc-f-bal').value=acc.bal;
    document.getElementById('acc-f-tipo').value=acc.tipo||'Conta corrente';
    document.getElementById('acc-f-banco').value=acc.banco||'Outro';
  } else {
    document.getElementById('modal-acc-title').textContent='🏦 Nova Conta';
    document.getElementById('acc-f-id').value='';
    document.getElementById('acc-f-name').value='';
    document.getElementById('acc-f-bal').value='';
    document.getElementById('acc-f-tipo').value='Conta corrente';
    document.getElementById('acc-f-banco').value='Outro';
  }
  document.getElementById('modal-acc').classList.add('open');
}
function pickEmoji(e,el){ _accEmoji=e; document.querySelectorAll('#acc-emoji-row .emoji-opt').forEach(x=>x.classList.remove('active')); el.classList.add('active'); }
function pickColor(c,el){ _accColor=c; document.querySelectorAll('#acc-color-row .swatch').forEach(x=>x.classList.remove('active')); el.classList.add('active'); }
function saveAcc(){
  const name=document.getElementById('acc-f-name').value.trim();
  const bal=parseFloat(document.getElementById('acc-f-bal').value)||0;
  const tipo=document.getElementById('acc-f-tipo').value;
  const banco=document.getElementById('acc-f-banco').value;
  const fid=document.getElementById('acc-f-id').value;
  if(!name){ alert('Informe um nome.'); return; }
  if(fid){
    const acc=ACCS.find(a=>a.id===parseInt(fid));
    if(acc){
      const oldName=acc.name;
      acc.name=name;acc.bal=bal;acc.tipo=tipo;acc.banco=banco;acc.color=_accColor;acc.icon=_accEmoji;
      if(oldName!==name){ txs.forEach(t=>{ if(t.acc===oldName) t.acc=name; }); SAVINGS.forEach(sv=>{ if(sv.accName===oldName) sv.accName=name; }); }
      toast('Conta atualizada!','ti-check','var(--green)');
    }
  } else {
    if(ACCS.find(a=>a.name.toLowerCase()===name.toLowerCase())){ alert('Já existe conta com esse nome.'); return; }
    ACCS.push({id:nextAccId++,name,bal,tipo,banco,color:_accColor,icon:_accEmoji});
    toast('Conta criada! 🏦','ti-building-bank','var(--blue)');
  }
  persist(); closeModal('modal-acc');
  if(curPage==='contas') renderContas();
  else if(curPage==='inicio') renderInicio();
}
function deleteAcc(id){
  const a=ACCS.find(x=>x.id===id); if(!a) return;
  showConfirm(`Excluir a conta "<strong>${a.name}</strong>"?<br>Lançamentos vinculados não serão removidos.`, ()=>{
    ACCS=ACCS.filter(x=>x.id!==id);
    persist(); renderContas();
    toast('Conta removida','ti-trash','var(--red)');
  });
}

function deleteAllData(){
  showConfirm('⚠️ Apagar TODOS os dados?<br><br>Esta ação é irreversível.',()=>{
    showConfirm('Tem certeza? Todos os lançamentos, contas e reservas serão perdidos.',()=>{
      txs=[];ACCS=[];SAVINGS=[];SAV_MOVES=[];
      nextId=1;nextAccId=1;nextSavId=1;nextSavMovId=1;_selTx.clear();
      persist(); navTo('inicio');
      toast('Dados apagados','ti-trash','var(--red)');
    },{title:'Última confirmação',okLabel:'Apagar tudo'});
  },{title:'Apagar todos os dados',okLabel:'Continuar'});
}

/* ================================================================
   MODAL TRANSAÇÃO
================================================================ */
function openTxModal(type){
  if(!ACCS.length){ toast('Crie uma conta primeiro!','ti-alert-triangle','var(--amber)'); navTo('contas'); return; }
  curType=type;
  const isRec=type==='receita';
  document.getElementById('modal-tx-title').textContent=isRec?'✅ Nova Receita':'💸 Nova Despesa';
  document.getElementById('tx-save-btn').className='btn '+(isRec?'btn-green':'btn-red');
  document.getElementById('f-id').value='';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('f-desc').value='';
  document.getElementById('f-val').value='';
  document.getElementById('f-obs').value='';
  document.getElementById('f-cat').innerHTML=(isRec?CATS_REC:CATS_EXP).map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('f-acc').innerHTML=ACCS.map(a=>`<option value="${a.name}">${a.icon} ${a.name}</option>`).join('');
  document.getElementById('modal-tx').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc').focus(),120);
}
function openTxEditModal(id){
  const t=txs.find(x=>x.id===id); if(!t) return;
  curType=t.type;
  const isRec=t.type==='receita';
  document.getElementById('modal-tx-title').textContent=isRec?'✏️ Editar Receita':'✏️ Editar Despesa';
  document.getElementById('tx-save-btn').className='btn '+(isRec?'btn-green':'btn-red');
  document.getElementById('f-id').value=t.id;
  document.getElementById('f-date').value=t.date;
  document.getElementById('f-desc').value=t.desc;
  document.getElementById('f-val').value=t.val;
  document.getElementById('f-obs').value=t.obs||'';
  document.getElementById('f-cat').innerHTML=(isRec?CATS_REC:CATS_EXP).map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('f-cat').value=t.cat;
  document.getElementById('f-acc').innerHTML=ACCS.map(a=>`<option value="${a.name}">${a.icon} ${a.name}</option>`).join('');
  document.getElementById('f-acc').value=t.acc;
  document.getElementById('modal-tx').classList.add('open');
}
function saveTx(){
  const fid=document.getElementById('f-id').value;
  const desc=document.getElementById('f-desc').value.trim();
  const val=parseFloat(document.getElementById('f-val').value);
  const date=document.getElementById('f-date').value;
  const cat=document.getElementById('f-cat').value;
  const acc=document.getElementById('f-acc').value;
  const obs=document.getElementById('f-obs').value.trim();
  if(!desc){ alert('Informe uma descrição.'); return; }
  if(!val||val<=0){ alert('Informe um valor válido.'); return; }
  if(!date){ alert('Informe a data.'); return; }
  if(fid){
    const t=txs.find(x=>x.id===parseInt(fid));
    if(t){
      const oldAcc=ACCS.find(a=>a.name===t.acc); if(oldAcc) oldAcc.bal+=t.type==='receita'?-t.val:t.val;
      const newAcc=ACCS.find(a=>a.name===acc); if(newAcc) newAcc.bal+=t.type==='receita'?val:-val;
      t.desc=desc;t.val=val;t.date=date;t.cat=cat;t.acc=acc;t.obs=obs;
    }
    toast('Atualizado! ✅','ti-check','var(--green)');
  } else {
    txs.unshift({id:nextId++,type:curType,desc,val,date,cat,acc,obs});
    const ac=ACCS.find(a=>a.name===acc);
    if(ac) ac.bal+=curType==='receita'?val:-val;
    toast(curType==='receita'?'Receita adicionada! 📈':'Despesa adicionada! 📉',
      curType==='receita'?'ti-trending-up':'ti-trending-down',
      curType==='receita'?'var(--green)':'var(--red)');
  }
  persist();
  closeModal('modal-tx');
  renderPage();
}

/* ================================================================
   RENDER DISPATCHER
================================================================ */
function renderPage(){
  ({
    inicio:renderInicio,
    lancamentos:renderLancamentos,
    relatorios:renderRelatorios,
    orcamentos:renderOrcamentos,
    contas:renderContas,
    poupanca:renderPoupanca,
    configuracoes:renderConfiguracoes,
  }[curPage]||(() => {}))();
}

document.getElementById('mob-month-label').textContent=_lbl;

</script>
